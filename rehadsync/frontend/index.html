<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RehabSync | Healthcare Initiative by AbbyJoseph</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  overflow-x:hidden;
}
.hidden{display:none}

/* LOADER */
.loader{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#0f2027;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2000;
}
.loader div{
  width:50px;height:50px;
  border:5px solid #00c6ff;
  border-top:5px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* LOGIN PAGE */
.login-container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.login-box{
  background:rgba(255,255,255,0.08);
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  width:350px;
}
.login-box h2{text-align:center;margin-bottom:20px;}
.login-box input{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border:none;
  border-radius:8px;
}
.login-box button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#00c6ff;
  cursor:pointer;
  transition:0.3s;
}
.login-box button:hover{background:#0072ff;}

/* DASHBOARD */
.dashboard{
  display:flex;
  height:100vh;
}
.sidebar{
  width:250px;
  background:rgba(0,0,0,0.5);
  padding:20px;
}
.sidebar h2{margin-bottom:20px;}
.sidebar ul{list-style:none;}
.sidebar ul li{
  padding:10px 0;
  cursor:pointer;
}
.sidebar ul li:hover{color:#00c6ff;}

.main{
  flex:1;
  padding:40px;
  overflow-y:auto;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}
.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  transition:0.4s;
}
.card:hover{
  transform:translateY(-5px);
  background:rgba(255,255,255,0.15);
}

/* SCROLL REVEAL */
.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}
.reveal.active{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader"><div></div></div>

<!-- LOGIN -->
<div class="login-container" id="loginPage">
  <div class="login-box">
    <h2>RehabSync</h2>
    <input type="text" id="username" placeholder="Enter Username">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard hidden" id="dashboard">
  <div class="sidebar">
    <h2>RehabSync</h2>
    <ul>
      <li onclick="showSection('analytics')">Analytics</li>
      <li onclick="showSection('leaderboard')">Leaderboard</li>
      <li onclick="logout()">Logout</li>
    </ul>
  </div>

  <div class="main">
    <!-- ANALYTICS -->
    <div id="analyticsSection">
      <h2>Health Analytics</h2>
      <div id="analyticsMessage"></div>
      <div class="cards reveal">
        <div class="card"><h3>Total Workouts</h3><p id="workouts">0</p></div>
        <div class="card"><h3>Total Distance</h3><p id="distance">0</p></div>
        <div class="card"><h3>Total Calories</h3><p id="calories">0</p></div>
      </div>

      <canvas id="healthChart" class="reveal" style="margin-top:40px;"></canvas>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboardSection" class="hidden">
      <h2>Leaderboard</h2>
      <p>Coming Soon — Enterprise Ranking System</p>
    </div>
  </div>
</div>

<script>
let currentUser = null;

window.onload = () => {
  setTimeout(()=> document.getElementById("loader").style.display="none", 1500);
};

function login(){
  const username = document.getElementById("username").value;
  if(!username) return alert("Enter username");

  currentUser = username;
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  loadAnalytics();
}

function logout(){
  location.reload();
}

function showSection(section){
  document.getElementById("analyticsSection").classList.add("hidden");
  document.getElementById("leaderboardSection").classList.add("hidden");
  document.getElementById(section+"Section").classList.remove("hidden");
}

async function loadAnalytics(){
  const response = await fetch(`https://organic-system-5jp6xqwxq4qfvwp6-8000.app.github.dev/analytics/${currentUser}`);
  const data = await response.json();

  if(data.message){
    document.getElementById("analyticsMessage").innerText="Register & Sync First";
    return;
  }

  document.getElementById("workouts").innerText=data.total_workouts;
  document.getElementById("distance").innerText=data.total_distance_km;
  document.getElementById("calories").innerText=data.total_calories;

  const ctx = document.getElementById("healthChart");
  new Chart(ctx,{
    type:'bar',
    data:{
      labels:['Workouts','Distance','Calories'],
      datasets:[{
        label:'Health Metrics',
        data:[data.total_workouts,data.total_distance_km,data.total_calories],
        backgroundColor:['#00c6ff','#0072ff','#00ffcc']
      }]
    },
    options:{responsive:true}
  });
}

/* SCROLL REVEAL */
window.addEventListener('scroll',()=>{
  document.querySelectorAll('.reveal').forEach(el=>{
    const windowHeight=window.innerHeight;
    const elementTop=el.getBoundingClientRect().top;
    if(elementTop < windowHeight-100){
      el.classList.add('active');
    }
  });
});
</script>

</body>
</html>
